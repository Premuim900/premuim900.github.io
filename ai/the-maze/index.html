<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Game</title>
    <style>
        body { margin: 0; background: #000; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let state = 'start';  // Game states: start, play, gameOver
        let player, enemies, keys, exit;
        let collectedKeys = [];

        // Initialize the game
        function init() {
            player = { x: 50, y: 50, size: 20, color: 'yellow' };
            enemies = [{ x: 200, y: 50, size: 20, color: 'brown', path: [] },
                       { x: 400, y: 50, size: 20, color: 'brown', path: [] },
                       { x: 300, y: 300, size: 20, color: 'brown', path: [] }];
            keys = [{ x: 100, y: 100, color: 'red' },
                     { x: 400, y: 300, color: 'green' },
                     { x: 600, y: 200, color: 'blue' }];
            exit = { x: 700, y: 500, unlocked: false };
            collectedKeys = [];
        }

        // Game loop
        function gameLoop() {
            update();
            render();
            if (state === 'play') {
                requestAnimationFrame(gameLoop);
            }
        }

        // Update game state
        function update() {
            handleInput();
            moveEnemies();
            checkCollisions();
        }

        // Render game elements
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (state === 'start') {
                renderStartScreen();
            } else if (state === 'gameOver') {
                renderGameOver();
            } else if (state === 'play') {
                renderPlayer();
                renderEnemies();
                renderKeys();
                renderExit();
            }
        }

        // Handle player input
        function handleInput() {
            window.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowUp' || e.key === 'w') player.y -= 5;
                if (e.key === 'ArrowDown' || e.key === 's') player.y += 5;
                if (e.key === 'ArrowLeft' || e.key === 'a') player.x -= 5;
                if (e.key === 'ArrowRight' || e.key === 'd') player.x += 5;
                if (state === 'start') state = 'play';
            });
        }

        // Move enemies with pathfinding
        function moveEnemies() {
            enemies.forEach(enemy => {
                enemy.path = aStar(enemy, player);
                if (enemy.path.length) {
                    enemy.x += Math.sign(player.x - enemy.x) * 2;
                    enemy.y += Math.sign(player.y - enemy.y) * 2;
                }
            });
        }

        // A* pathfinding algorithm placeholder
        function aStar(start, goal) {
            return [];  // Implement A* algorithm here
        }

        // Check for collisions
        function checkCollisions() {
            enemies.forEach(enemy => {
                if (Math.abs(player.x - enemy.x) < player.size && Math.abs(player.y - enemy.y) < player.size) {
                    state = 'gameOver';
                }
            });
            keys = keys.filter(key => {
                if (Math.abs(player.x - key.x) < player.size && Math.abs(player.y - key.y) < player.size) {
                    collectedKeys.push(key.color);
                    return false;
                }
                return true;
            });
            if (collectedKeys.length === 3) {
                exit.unlocked = true;
            }
        }

        // Render functions
        function renderPlayer() { ctx.fillStyle = player.color; ctx.fillRect(player.x, player.y, player.size, player.size); }
        function renderEnemies() { enemies.forEach(enemy => { ctx.fillStyle = enemy.color; ctx.fillRect(enemy.x, enemy.y, enemy.size, enemy.size); }); }
        function renderKeys() { keys.forEach(key => { ctx.fillStyle = key.color; ctx.fillRect(key.x, key.y, 20, 20); }); }
        function renderExit() { ctx.fillStyle = exit.unlocked ? 'gold' : 'gray'; ctx.fillRect(exit.x, exit.y, 50, 50); }

        // Start and game over screens
        function renderStartScreen() { ctx.fillStyle = 'white'; ctx.fillText('Press any key to start', 100, 100); }
        function renderGameOver() { ctx.fillStyle = 'red'; ctx.fillText('Game Over', 100, 100); }

        // Initialize and start game
        init();
        gameLoop();
    </script>
</body>
</html>
