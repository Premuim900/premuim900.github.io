<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Game</title>
    <style>
        body { margin: 0; background: #000; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const speed = 20;
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let state = 'start';  // Game states: start, play, gameOver
        let player, enemies, keys, exit;
        let collectedKeys = [];

        // Initialize the game
        function init() {
            player = { x: 50, y: 50, size: 20, color: 'yellow' };
            enemies = [{ x: 200, y: 50, size: 20, color: 'brown' },
                       { x: 400, y: 50, size: 20, color: 'brown' },
                       { x: 300, y: 300, size: 20, color: 'brown' }];
            keys = [{ x: 100, y: 100, color: 'red' },
                    { x: 400, y: 300, color: 'green' },
                    { x: 600, y: 200, color: 'blue' }];
            exit = { x: 700, y: 500, unlocked: false };
            collectedKeys = [];
        }

        // Game loop
        function gameLoop() {
            update();
            render();
            if (state === 'play') {
                requestAnimationFrame(gameLoop);
            }
        }

        // Update game state
        function update() {
            moveEnemies();
            checkCollisions();
        }

        // Render game elements
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (state === 'start') {
                renderStartScreen();
            } else if (state === 'gameOver') {
                renderGameOver();
            } else if (state === 'play') {
                renderPlayer();
                renderEnemies();
                renderKeys();
                renderExit();
            }
        }

        // Handle player input
        function handleInput(e) {
            if (state === 'start') {
                state = 'play';
                gameLoop();
            }

            if (e.key === 'ArrowUp' || e.key === 'w') player.y = Math.max(0, player.y - speed);
            if (e.key === 'ArrowDown' || e.key === 's') player.y = Math.min(canvas.height - player.size, player.y + speed);
            if (e.key === 'ArrowLeft' || e.key === 'a') player.x = Math.max(0, player.x - speed);
            if (e.key === 'ArrowRight' || e.key === 'd') player.x = Math.min(canvas.width - player.size, player.x + speed);
        }
        window.addEventListener('keydown', handleInput);

        // Move enemies towards the player
        function moveEnemies() {
            for (const enemy of enemies) {
                enemy.x += Math.sign(player.x - enemy.x) * 2;
                enemy.y += Math.sign(player.y - enemy.y) * 2;
            }
        }

        // Check for collisions
        function checkCollisions() {
            // Enemy collision
            for (const enemy of enemies) {
                if (
                    player.x < enemy.x + enemy.size &&
                    player.x + player.size > enemy.x &&
                    player.y < enemy.y + enemy.size &&
                    player.y + player.size > enemy.y
                ) {
                    state = 'gameOver';
                }
            }

            // Key collection
            keys = keys.filter(key => {
                if (
                    player.x < key.x + 20 &&
                    player.x + player.size > key.x &&
                    player.y < key.y + 20 &&
                    player.y + player.size > key.y
                ) {
                    collectedKeys.push(key.color);
                    return false;
                }
                return true;
            });

            // Check if exit is unlocked
            if (collectedKeys.length === 3) {
                exit.unlocked = true;
            }
        }

        // Render functions
        function renderPlayer() {
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.size, player.size);
        }
        function renderEnemies() {
            enemies.forEach(enemy => {
                ctx.fillStyle = enemy.color;
                ctx.fillRect(enemy.x, enemy.y, enemy.size, enemy.size);
            });
        }
        function renderKeys() {
            keys.forEach(key => {
                ctx.fillStyle = key.color;
                ctx.fillRect(key.x, key.y, 20, 20);
            });
        }
        function renderExit() {
            ctx.fillStyle = exit.unlocked ? 'gold' : 'gray';
            ctx.fillRect(exit.x, exit.y, 50, 50);
        }

        // Centered start and game over screens
        function renderStartScreen() {
            ctx.fillStyle = 'white';
            ctx.textAlign = 'center';
            ctx.font = '24px Arial';
            ctx.fillText('Press any key to start', canvas.width / 2, canvas.height / 2);
        }
        function renderGameOver() {
            ctx.fillStyle = 'red';
            ctx.textAlign = 'center';
            ctx.font = '24px Arial';
            ctx.fillText('Game Over', canvas.width / 2, canvas.height / 2);
        }

        // Initialize the game
        init();
        renderStartScreen();
    </script>
</body>
</html>
