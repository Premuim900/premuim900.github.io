<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Silkscreen&display=swap');
        body { 
            margin: 0; 
            background: #000; 
            font-family: 'Silkscreen', monospace; 
        }
        canvas { 
            display: block; 
            margin: 0 auto; 
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const speed = 4; // Smooth movement speed for player
        const enemySpeed = 1; // Slower movement speed for enemies
        let state = 'start';  // Game states
        let player, enemies, keys, exit, walls;
        let collectedKeys = [];
        let moveX = 0, moveY = 0;

        // Initialize win counter
        let winCount = parseInt(localStorage.getItem('winCount')) || 0;

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'r' && (state === 'gameOver' || state === 'win' || state === 'play')) {
                init();
                state = 'start';
                renderStartScreen();
                return;
            }

            if (state === 'start') {
                state = 'play';
                gameLoop();
            }

            if (e.key === 'ArrowUp' || e.key === 'w') moveY = -speed;
            if (e.key === 'ArrowDown' || e.key === 's') moveY = speed;
            if (e.key === 'ArrowLeft' || e.key === 'a') moveX = -speed;
            if (e.key === 'ArrowRight' || e.key === 'd') moveX = speed;
        });

        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'ArrowDown' || e.key === 's') moveY = 0;
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'ArrowRight' || e.key === 'd') moveX = 0;
        });

        // Initialize the game
        function init() {
            player = { x: 50, y: 50, size: 20, color: 'yellow' };
            enemies = [{ x: 200, y: 50, size: 20, color: 'brown' },
                       { x: 400, y: 50, size: 20, color: 'brown' },
                       { x: 300, y: 300, size: 20, color: 'brown' }];
            keys = [{ x: 100, y: 100, color: 'red' },
                    { x: 400, y: 300, color: 'green' },
                    { x: 600, y: 200, color: 'blue' }];
            exit = { x: 700, y: 500, unlocked: false };
            collectedKeys = [];
            walls = [
                { x: 100, y: 100, width: 500, height: 20 },
                { x: 200, y: 200, width: 20, height: 300 },
                { x: 300, y: 150, width: 300, height: 20 },
                { x: 500, y: 300, width: 20, height: 200 },
                { x: 400, y: 400, width: 200, height: 20 }, // New wall
                { x: 50, y: 350, width: 150, height: 20 }, // New wall
                { x: 250, y: 500, width: 300, height: 20 }, // New wall
                { x: 600, y: 50, width: 20, height: 150 }, // New wall
            ];
        }

        // Game loop
        function gameLoop() {
            update();
            render();
            if (state === 'play') {
                requestAnimationFrame(gameLoop);
            }
        }

        // Update game state
        function update() {
            movePlayer();
            moveEnemies();
            checkCollisions();
        }

        // Move player with wall collision
        function movePlayer() {
            const nextX = player.x + moveX;
            const nextY = player.y + moveY;

            if (!checkWallCollision(nextX, player.y, player.size, player.size)) {
                player.x = nextX;
            }
            if (!checkWallCollision(player.x, nextY, player.size, player.size)) {
                player.y = nextY;
            }
        }

        // Move enemies with wall collision
        function moveEnemies() {
            for (const enemy of enemies) {
                const moveToX = enemy.x + Math.sign(player.x - enemy.x) * enemySpeed;
                const moveToY = enemy.y + Math.sign(player.y - enemy.y) * enemySpeed;

                if (!checkWallCollision(moveToX, enemy.y, enemy.size, enemy.size)) {
                    enemy.x = moveToX;
                }
                if (!checkWallCollision(enemy.x, moveToY, enemy.size, enemy.size)) {
                    enemy.y = moveToY;
                }
            }
        }

        // Check for wall collision
        function checkWallCollision(x, y, width, height) {
            for (const wall of walls) {
                if (
                    x < wall.x + wall.width &&
                    x + width > wall.x &&
                    y < wall.y + wall.height &&
                    y + height > wall.y
                ) {
                    return true;
                }
            }
            return false;
        }

        // Check for other collisions
        function checkCollisions() {
            // Enemy collision
            for (const enemy of enemies) {
                if (
                    player.x < enemy.x + enemy.size &&
                    player.x + player.size > enemy.x &&
                    player.y < enemy.y + enemy.size &&
                    player.y + player.size > enemy.y
                ) {
                    state = 'gameOver';
                }
            }

            // Key collection
            keys = keys.filter(key => {
                if (
                    player.x < key.x + 20 &&
                    player.x + player.size > key.x &&
                    player.y < key.y + 20 &&
                    player.y + player.size > key.y
                ) {
                    collectedKeys.push(key.color);
                    return false;
                }
                return true;
            });

            // Check if exit is unlocked
            if (collectedKeys.length === 3) {
                exit.unlocked = true;
            }

            // Check if player reaches unlocked exit
            if (
                exit.unlocked &&
                player.x < exit.x + 50 &&
                player.x + player.size > exit.x &&
                player.y < exit.y + 50 &&
                player.y + player.size > exit.y
            ) {
                state = 'win';
                winCount++;
                localStorage.setItem('winCount', winCount);
            }
        }

        // Render game elements
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (state === 'start') {
                renderStartScreen();
            } else if (state === 'gameOver') {
                renderGameOver();
            } else if (state === 'play') {
                renderPlayer();
                renderEnemies();
                renderKeys();
                renderExit();
                renderWalls();
            } else if (state === 'win') {
                renderWinScreen();
            }
        }

        // Render functions
        function renderPlayer() {
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.size, player.size);
        }

        function renderEnemies() {
            enemies.forEach(enemy => {
                ctx.fillStyle = enemy.color;
                ctx.fillRect(enemy.x, enemy.y, enemy.size, enemy.size);
            });
        }

        function renderKeys() {
            keys.forEach(key => {
                ctx.fillStyle = key.color;
                ctx.fillRect(key.x, key.y, 20, 20);
            });
        }

        function renderExit() {
            ctx.fillStyle = exit.unlocked ? 'gold' : 'gray';
            ctx.fillRect(exit.x, exit.y, 50, 50);
        }

        function renderWalls() {
            ctx.fillStyle = 'gray';
            walls.forEach(wall => {
                ctx.fillRect(wall.x, wall.y, wall.width, wall.height);
            });
        }

        // Render start screen
        function renderStartScreen() {
            ctx.fillStyle = 'white';
            ctx.textAlign = 'center';
            ctx.font = '24px Silkscreen, monospace';
            ctx.fillText('Press any key to start', canvas.width / 2, canvas.height / 2);
            ctx.fillText('Controls: W, A, S, D', canvas.width / 2, canvas.height / 2 + 50);
            ctx.fillText('Win Count: ' + winCount, canvas.width / 2, canvas.height / 2 + 100);
        }

        // Render game over screen
        function renderGameOver() {
            ctx.fillStyle = 'red';
            ctx.textAlign = 'center';
            ctx.font = '24px Silkscreen, monospace';
            ctx.fillText('Game Over', canvas.width / 2, canvas.height / 2);
            ctx.fillText('Press R to restart', canvas.width / 2, canvas.height / 2 + 50);
        }

        // Render win screen
        function renderWinScreen() {
            ctx.fillStyle = 'green';
            ctx.textAlign = 'center';
            ctx.font = '24px Silkscreen, monospace';
            ctx.fillText('You Win!', canvas.width / 2, canvas.height / 2);
            ctx.fillText('Press R to restart', canvas.width / 2, canvas.height / 2 + 50);
            ctx.fillText('Win Count: ' + winCount, canvas.width / 2, canvas.height / 2 + 100);
        }

        // Initialize the game
        init();
        renderStartScreen();
    </script>
</body>
</html>
